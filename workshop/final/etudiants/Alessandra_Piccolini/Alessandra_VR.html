<!DOCTYPE html>
<html>

<head>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src=" https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js "></script>
    <script src="https://eminet666.github.io/abaroma/lib/gonanim_component.js"></script>
</head>

<body>
  <a-scene>
     <a-assets>
      <a-asset-item id="alessandraglb" src="./assets/alessandra.glb"></a-asset-item>
      <a-asset-item id="valentinaglb" src="./assets/valentina.glb"></a-asset-item>
      <a-asset-item id="lorenzonardiglb" src="./assets/lorenzo nardi.glb"></a-asset-item>
      <a-asset-item id="Saraglb" src="./assets/Sara.glb"></a-asset-item>
      </a-assets>

      <a-entity id="alessandra"
        gltf-model="#alessandraglb"
        animation-mixer="timeScale: 2"
        position="0 0 -4" rotation="0 0 0" scale="1 1 1"
        shadow="cast:true; receive:true"
        goanim="next: Sara; timeScale: 1">
      </a-entity>

      <a-entity id="valentina"
        gltf-model="#valentinaglb" 
        animation-mixer="timeScale: 0"
        position="1 0 -4" rotation="0 0 0" scale="1 1 1"
        shadow="cast:true; receive:true"
        goanim="next: alessandra; timeScale: 2">
      </a-entity>

      <a-entity id="lorenzonardi"
        gltf-model="#lorenzonardiglb" 
        animation-mixer="timeScale: 0"
        position="-1 0 -4" rotation="0 0 0" scale="1 1 1"
        shadow="cast:true; receive:true"
        goanim="next: valentina; timeScale: 3">
      </a-entity>

      <a-entity id="Sara"
        gltf-model="#Saraglb" 
        animation-mixer="timeScale: 0"
        position="-2 0 -4" rotation="0 0 0" scale="1 1 1"
        shadow="cast:true; receive:true"
        goanim="next: lorenzonardi; timeScale: 3">
      </a-entity>

        <!-- plane -->
        <a-plane position="0 0 -6" color="grey" height="12" width="12" rotation="-90 0 0" shadow></a-plane>

        <a-entity camera look-controls position="0 1.6 0"></a-entity>
    </a-scene>

</body>

</html>
