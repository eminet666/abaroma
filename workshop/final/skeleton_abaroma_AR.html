<!DOCTYPE html>
<html>

<head>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src=" https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js "></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://eminet666.github.io/abaroma/lib/gonanim_component.js"></script>
    <script src="https://eminet666.github.io/abaroma/lib/common.js"></script>
</head>

<body>
    <a-scene ar>
        <!-- MAKE YOUR OWN CHOREGRAPHIE BELOW ... -->
        <a-assets>
            <a-asset-item id="name1glb" src="./assets/name1/name1.glb"></a-asset-item>
            <a-asset-item id="name2glb" src="./assets/name2/name2.glb"></a-asset-item>
        </a-assets>

        <a-entity id="name1" position="-2 0 -4" 
            gltf-model="#name1glb" 
            animation-mixer="timeScale : 4"
            shadow="cast:true; receive:true"
            goanim="next: name2; timescale: 1;">
        </a-entity>

        <a-entity id="name2" position="-1 0 -3" 
            gltf-model="#name2glb" 
            animation-mixer="timeScale : 0;"
            shadow="cast:true; receive:true"
            goanim="next: name1; timescale: 2;">
        </a-entity>

        <!-- ----------------------------------------------- -->
        <a-plane position="0 0 -3" rotation="-90 0 0" width="8" height="8" color="#CCCCCC" shadow="receive: true" shadow-material="opacite: 0.5"></a-plane>  
        <a-entity camera look-controls position="0 1.6 0"></a-entity>
    </a-scene>

</body>

</html>
