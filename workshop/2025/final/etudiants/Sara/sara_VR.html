<!DOCTYPE html>
<html>

<head>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src=" https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js "></script>
    <script src="https://eminet666.github.io/abaroma/lib/gonanim_component.js"></script>
</head>

<body>
    <a-scene background="color: skyblue">
        <a-assets>
            <a-asset-item id="saraglb" src="./glb_exports/Sara/Sara.glb"></a-asset-item>
            <a-asset-item id="martinaglb" src="./glb_exports/Martina/martina.glb"></a-asset-item>
            <a-asset-item id="auroraglb" src="./glb_exports/aurora/D_2025_aurora.glb version.glb"></a-asset-item>
        </a-assets>

        <a-entity id="sara" position="-1 0 -4" 
            gltf-model="#saraglb" 
            animation-mixer="clip: rig_EAction; timescale: 1"
            shadow="cast:true; receive:true"
            goanim="next: sara; timescale: 2;">
        </a-entity>

        <a-entity id="sara" position="1 0 -4" 
        gltf-model="#saraglb" 
        animation-mixer="clip: rig_EAction; timescale: 1"
        shadow="cast:true; receive:true"
        goanim="next: martina; timescale: 2;">
    </a-entity>

        <a-entity id="martina" position="3 0 -6" 
            gltf-model="#martinaglb" 
            animation-mixer="timeScale : 1;"
            shadow="cast:true; receive:true"
            goanim="next: aurora; timescale: 2;">
        </a-entity>

        <a-entity id="aurora" position="0.2 0 -6" 
        gltf-model="#auroraglb" 
        animation-mixer="timeScale : 0.5; "
        shadow="cast:true; receive:true"
        goanim="next: sara; timescale: 2;">
    </a-entity>
    
        <!-- plane -->
        <a-plane position="0 0 -6" color="#545454" height="12" width="12" rotation="-90 0 0" shadow></a-plane>

        <a-entity camera look-controls position="0 2 0"></a-entity>
    </a-scene>

</body>

</html>
