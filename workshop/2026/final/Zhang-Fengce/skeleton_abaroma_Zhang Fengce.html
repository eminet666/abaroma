<!DOCTYPE html>
<html>

<head>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src=" https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js "></script>
    <script src="https://eminet666.github.io/abaroma/lib/gonanim_component.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js">
    </script>
</head>

<body>
    <a-scene background="color: skyblue">
        <a-assets>
         <a-asset-item id="name1glb" src="./assets/Zhang Fengce.glb"></a-asset-item>
         <a-asset-item id="name2glb" src="./C_2026_Alessia_Aversa.glb"></a-asset-item>
         <a-asset-item id="name3glb" src="./C_2026_Eleonora_Rossi.glb"></a-asset-item>
         <a-asset-item id="name4glb" src="./C_Silvestri_Chiara.glb"></a-asset-item>
         <a-asset-item id="name5glb" src="./C_Wang _Jiayu.glb"></a-asset-item>
         <a-asset-item id="name6glb" src="./Gao Ruiyu-workshop.glb"></a-asset-item>
         <a-asset-item id="name7glb" src="./Lu weicheng.glb"></a-asset-item>
         <a-asset-item id="name8glb" src="./Yang_sihan.glb"></a-asset-item>
         <a-asset-item id="flamingoglb" src="./assets/3Danims/birds/Flamingo.glb"></a-asset-item>
         <a-asset-item id="parrot-glb" src="./assets/3Danims/birds/Parrot.glb"></a-asset-item>
         <a-asset-item id="stork-glb" src="./assets/3Danims/birds/Stork.glb"></a-asset-item>
         <a-asset-item id="fox-glb" src="./assets/3Danims/fox/fox.glb"></a-asset-item>
        


        </a-assets>
        
        <a-entity id="name1" position="-2 0 -4" gltf-model="#name1glb" 
            animation-mixer="timeScale : 1"
            shadow="cast:true; loop: repeat; receive:true" 
            goanim="next: name2; timescale: 1;">
          </a-entity>

          <a-entity id="name2" position="0 0 -4" gltf-model="#name2glb" 
            animation-mixer="timeScale : 1"
            shadow="cast:true; loop: repeat; receive:true" 
            goanim="next: name3; timescale: 2;">
          </a-entity>
          
          <a-entity id="name3" position="2 0 -4" gltf-model="#name3glb" 
            animation-mixer="timeScale : 1"
            shadow="cast:true; loop: repeat; receive:true" 
            goanim="next: name4; timescale: 2;">
          </a-entity>

          <a-entity id="name4" position="-1 0 -6" gltf-model="#name4glb" 
            animation-mixer="timeScale : 1"
            shadow="cast:true; loop: repeat; receive:true" 
            goanim="next: name5; timescale: 2;">
          </a-entity>

          <a-entity id="name5" position="1 0 -6" gltf-model="#name5glb" 
            animation-mixer="timeScale : 1"
            shadow="cast:true; loop: repeat; receive:true" 
            goanim="next: name6; timescale: 2;">
          </a-entity>

          <a-entity id="name6" position="1 0 -2" gltf-model="#name6glb" 
            animation-mixer="timeScale : 1"
            shadow="cast:true; loop: repeat; receive:true" 
            goanim="next: name7; timescale: 2;">
          </a-entity>

          <a-entity id="name7" position="-1 0 -4" gltf-model="#name7glb" 
            animation-mixer="timeScale : 1"
            shadow="cast:true; loop: repeat; receive:true" 
            goanim="next: name8; timescale: 2;">
          </a-entity>
          
          <a-entity id="name8" position="3 0 -4" gltf-model="#name8glb" 
            animation-mixer="timeScale : 1"
            shadow="cast:true; loop: repeat; receive:true" 
            goanim="next: fox; timescale: 2;">
          </a-entity>

          <a-entity id="fox" position="2 0 -5" scale="0.01 0.01 0.01 " gltf-model="#fox-glb" 
            animation-mixer="timeScale : 1" 
            animation-mixer="clip: Walk; loop: repeat; timeScale: 1.2; duration: 5"
            shadow="cast:true; loop: repeat; receive:true" 
            goanim="next: flamingo; timescale: 1;">  
          </a-entity>

            <a-entity id="fox2" position="4 0 -5" scale="0.01 0.01 0.01 " gltf-model="#fox-glb" 
            animation-mixer="timeScale : 1" 
            animation-mixer="clip: Walk; loop: repeat; timeScale: 1.2; duration: 5"
            shadow="cast:true; loop: repeat; receive:true" 
            goanim="next: flamingo; timescale: 1;">  
          </a-entity>
   
           <a-entity id="fox2" position="-4 0 -5" scale="0.01 0.01 0.01 " gltf-model="#fox-glb" 
            animation-mixer="timeScale : 1" 
            animation-mixer="clip: Run; loop: repeat; timeScale: 2; duration: 5"
            shadow="cast:true; loop: repeat; receive:true" 
            goanim="next: flamingo; timescale: 1;">  
          </a-entity>
   


         <a-entity id="flamingo" position="-3 5 -3" gltf-model="#flamingoglb" position="0 3 -3" scale="0.3 0.3 0.3" rotation="0 0 0"
           animation-mixer shadow="cast:true; receive:true" 
            goanim="next: parrot; timescale: 1;">  </a-entity>

         <a-entity id="parrot" position="-1 6 -4 " gltf-model="#parrot-glb" position="0 2 -4" scale=" 0.5 0.5 0.5  " rotation="0 0 0"
          animation-mixer shadow="cast:true; receive:true" 
            goanim="next: stork; timescale: 1;"></a-entity>

          <a-entity id="stork" position="2 4 -1" gltf-model="#stork-glb" position="0 2 -3" scale=" 0.5 0.5 0.5 " rotation="0 0 0"
          animation-mixer shadow="cast:true; receive:true" 
            goanim="next: name1; timescale: 1;">


        
        <!-- plane -->
        <a-plane position="0 0 -6" color="grey" height="12" width="12" rotation="-90 0 0" shadow></a-plane>

        <!-- <a-entity camera look-controls position="0 1.6 0"></a-entity> -->
    </a-scene>

</body>

</html>
