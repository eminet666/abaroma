<!DOCTYPE html>
<html>

<head>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src=" https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js "></script>
    <script src="https://eminet666.github.io/abaroma/lib/gonanim_component.js"></script>
</head>

<body>
    <a-scene background="color: skyblue">
        <a-assets>
            <a-asset-item id="girl-glb" src="./girl.glb"></a-asset-item>
            <a-asset-item id="E_Chiara_Graziosi_2026-glb" src="./E_Chiara_Graziosi_2026.glb"></a-asset-item>
            <a-asset-item id="E_Tang_Yishan-glb" src="./E_Tang_Yishan.glb"></a-asset-item>
            <a-asset-item id="J_Yuechen Yang-glb" src="./J_Yuechen Yang.glb"></a-asset-item>
            <a-asset-item id="wang yuyun-glb" src="./wang yuyun.glb"></a-asset-item>
        </a-assets>
        </a-assets>
        
        <a-entity id="girl" position="-4 0 -6" gltf-model="#girl-glb" 
            animation-mixer="timeScale : 2"
            shadow="cast:true; receive:true" 
            goanim="next: parrot; timescale: 1;">
        </a-entity>
        
        <a-entity id="E_Chiara_Graziosi_2026" position="-2 0 -6" gltf-model="#E_Chiara_Graziosi_2026-glb" 
            animation-mixer="timeScale : 2"
            shadow="cast:true; receive:true" 
            goanim="next: parrot; timescale: 1;">
        </a-entity>

       <a-entity id="E_Tang_Yishan" position="0 0 -6" gltf-model="#E_Tang_Yishan-glb" 
            animation-mixer="timeScale : 2"
            shadow="cast:true; receive:true" 
            goanim="next: parrot; timescale: 1;">
        </a-entity>
        
        <a-entity id="J_Yuechen Yang" position="2 0 -6" gltf-model="#J_Yuechen Yang-glb" 
            animation-mixer="timeScale : 2"
            shadow="cast:true; receive:true" 
            goanim="next: parrot; timescale: 1;">
        </a-entity>

        <a-entity id="wang yuyun" position="4 0 -6" gltf-model="#wang yuyun-glb" 
            animation-mixer="timeScale : 2"
            shadow="cast:true; receive:true" 
            goanim="next: parrot; timescale: 1;">
        </a-entity>
        <!-- plane -->
        <a-plane position="0 0 -6" color="grey" height="12" width="12" rotation="-90 0 0" shadow></a-plane>

        <!-- <a-entity camera look-controls position="0 1.6 0"></a-entity> -->
    </a-scene>

</body>

</html>
